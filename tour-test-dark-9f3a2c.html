<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Tour widget test (dark, isolated)</title>
<style>
  body { margin: 0; background: #0a0908; color: #e8e4df; font-family: Arial, Helvetica, sans-serif; padding: 40px 20px 80px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 24px; letter-spacing: 1px; }
  .sub { color: #a39e96; font-size: 13px; margin-bottom: 32px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Tour widget &middot; dark, single widget (isolated)</h1>
    <p class="sub">Only ONE widget on the page, so no style bleed. This is what production would actually render.</p>
    <a class="bit-widget-initializer"
       data-artist-name="id_7267344"
       data-display-local-dates="true"
       data-local-dates-position="tab"
       data-display-past-dates="false"
       data-display-details="true"
       data-display-lineup="false"
       data-display-start-time="true"
       data-social-share-icon="true"
       data-display-limit="all"
       data-date-format="MMM. D, YYYY"
       data-date-orientation="horizontal"
       data-auto-style="true"
       data-background-color="rgba(10,9,8,1)"
       data-separator-color="rgba(61,52,38,0.7)"
       data-text-color="rgba(232,228,223,1)"
       data-link-color="rgba(201,166,107,1)"
       data-link-text-color="rgba(10,9,8,1)"
       data-font="Helvetica"
       data-event-ticket-text="TICKETS"
       data-event-rsvp-text="REMIND ME"
       data-bit-logo-position="bottomRight"
       data-display-play-my-city="false">
    </a>
  </div>
  <script charset="utf-8" src="https://widgetv3.bandsintown.com/main.min.js"></script>
</body>
</html>
